name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run build
        run: npm run build

  # Standardized org-wide required check: aggregates all CI jobs into a single
  # status named `ok`. See FlowMatrix-AI/eng-governance for the convention.
  ok:
    name: ok
    needs: [build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "needs results: $results"
          case "$results" in
            *failure*|*cancelled*) echo "::error::a required CI job did not succeed"; exit 1 ;;
          esac
          echo "ok"
